<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eNotas Emissor &middot; Painel protegido</title>
<style>
:root{--page:#f5f3ef;--white:#fff;--primary:#0d0d0d;--secondary:#6f6c67;--muted:#96938d;--border:#e3e0da;--border-strong:#c3bfb8;--teal:#22baa0;--teal-dark:#0f6b5a;--teal-bg:#d7f3ee;--crit-bg:#fde8e4;--crit-br:#f8c6bb;--crit-tx:#b3341a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hotmart Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--page);color:var(--primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(13,13,13,.06);padding:34px 32px;width:100%;max-width:372px;text-align:center}
.logo{font-weight:700;font-size:24px;letter-spacing:-.5px;margin-bottom:22px}
.logo span{color:var(--teal)}
.lock{width:44px;height:44px;border-radius:50%;background:var(--teal-bg);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
h1{font-size:19px;font-weight:600;margin-bottom:6px}
p.sub{font-size:13px;color:var(--secondary);margin-bottom:22px;line-height:1.5}
form{display:flex;flex-direction:column;gap:12px}
.field{position:relative}
input{width:100%;height:46px;border:1px solid var(--border-strong);border-radius:8px;padding:0 44px 0 14px;font-family:inherit;font-size:15px;color:var(--primary);background:var(--white)}
input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(34,186,160,.15)}
.toggle{position:absolute;right:6px;top:6px;width:34px;height:34px;border:none;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px}
.toggle:hover{color:var(--secondary);background:var(--page)}
button.go{height:46px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
button.go:hover{background:#1ea98f}
button.go:disabled{opacity:.6;cursor:default}
.err{font-size:13px;color:var(--crit-tx);background:var(--crit-bg);border:1px solid var(--crit-br);border-radius:8px;padding:9px 12px;display:none;text-align:left}
.err.show{display:block}
.foot{font-size:11px;color:var(--muted);margin-top:18px}
.nojs{font-size:13px;color:var(--crit-tx)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">e<span>Notas</span></div>
  <div class="lock">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
  </div>
  <h1>Painel protegido</h1>
  <p class="sub">Digite a senha para acessar o Painel de Cruzamento &mdash; Emissor.</p>
  <form id="f" autocomplete="off">
    <div class="field">
      <input id="pw" type="password" placeholder="Senha de acesso" autofocus aria-label="Senha de acesso">
      <button type="button" class="toggle" id="tg" aria-label="Mostrar senha">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="err" id="err"></div>
    <button class="go" id="go" type="submit">Entrar</button>
  </form>
  <div class="foot">Acesso restrito &middot; conte&uacute;do criptografado (AES-256)</div>
  <noscript><p class="nojs" style="margin-top:14px">Este painel precisa de JavaScript habilitado.</p></noscript>
</div>

function b2u(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
var f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),go=document.getElementById('go'),tg=document.getElementById('tg');
tg.addEventListener('click',function(){pw.type=pw.type==='password'?'text':'password';pw.focus();});
function fail(m){err.textContent=m;err.classList.add('show');go.disabled=false;go.textContent='Entrar';pw.focus();pw.select();}
f.addEventListener('submit',async function(e){
  e.preventDefault();
  err.classList.remove('show');
  if(!window.crypto||!crypto.subtle){fail('Abra o painel via HTTPS, localhost ou arquivo local — este navegador/contexto não permite descriptografar.');return;}
  go.disabled=true;go.textContent='Verificando…';
  try{
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey('raw',enc.encode(pw.value),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(DATA));
    var htmlOut=new TextDecoder().decode(buf);
    document.open();document.write(htmlOut);document.close();
  }catch(ex){fail('Senha incorreta. Tente novamente.');}
});
</script>
